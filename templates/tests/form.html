{% extends "base.html" %}
{% block title %}Create Test{% endblock %}
{% block content %}
<div class="page-header">
  <div>
    <h2>📝 Create Test</h2>
    <p class="page-sub">Set the basics here — you'll add questions and assign students on the next screen.</p>
  </div>
</div>
<div class="card">
  <form method="post">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="form-group">
      <label>Test Title</label>
      <input type="text" name="title" required>
    </div>
    <div class="form-group">
      <label>Duration (minutes)</label>
      <input type="number" name="duration_minutes" min="1" required>
    </div>
    <div class="form-group">
      <label>Rules / Instructions (shown to students before they start)</label>
      <textarea name="rules" rows="4" placeholder="e.g. No switching tabs, submit before the timer ends, calculators are not allowed..."></textarea>
    </div>
    <button type="submit" class="btn">Create &amp; Add Questions</button>
  </form>
</div>
{% endblock %}
