{% extends "base.html" %}
{% block title %}Settings{% endblock %}
{% block content %}
<h2>Payment Settings</h2>
<div class="card">
  <form method="post" enctype="multipart/form-data">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="form-group">
      <label>Default Price per Session</label>
      <input type="number" step="0.01" name="default_price" value="{{ default_price }}">
    </div>
    <div class="form-group">
      <label>Payment QR Code Image</label>
      <input type="file" name="qr_code" accept="image/png,image/jpeg">
    </div>
    <img src="{{ url_for('static', filename='qr_code.png') }}" class="qr-image" alt="Current QR code">
    <br><br>
    <button type="submit" class="btn">Save Settings</button>
  </form>
</div>
{% endblock %}
